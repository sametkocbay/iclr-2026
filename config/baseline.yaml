# Baseline training configuration for the MLP/MNO model.
dataset_dir: dataset_huggingface/warped-ifw
batch_size: 1
test_batch_size: 1
num_workers: 4
prefetch_factor: 4
persistent_workers: true
num_points: 100000
random_subsample: false
val_fraction: 0.05
test_fraction: 0.05

overfit_single: false
overfit_file: ""
overfit_index: 0
overfit_repeats: 1

latent_dim: 128
num_modes: 256
num_heads: 8
num_blocks: 4
k: 16
knn_query_chunk_size: 1024
graph_query_chunk_size: 2048
use_torch_cluster_knn: true

epochs: 500
lr: 0.001
lr_scheduler: auto
weight_decay: 0.0001
loss_fn: rl2
sobolev_grad_weight: 0.1
wall_distance_loss_alpha: 0.0
use_amp: true
cudnn_benchmark: true
scaler_eps: 0.000001
grad_clip: 1.0
no_slip_atol: 0.0
assert_no_slip_train: false
assert_no_slip_val: false
assert_no_slip_test: false
boundary_point_fraction: 0.0
seed: 42
resume_from: ""
checkpoint_path: models/mlp/state_dict.pt
history_run_name: ""
runs_dir: outputs/runs
